name: Daily Global News Copilot

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  send-daily-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch news and send email
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          EMAIL_ADDRESS: asaurav937@gmail.com
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: |
          python3 << 'EOF'
          import smtplib
          import requests
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime
          import os

          newsapi_key = os.getenv('NEWSAPI_KEY')
          email_address = os.getenv('EMAIL_ADDRESS')
          email_password = os.getenv('EMAIL_APP_PASSWORD')

          url = f'https://newsapi.org/v2/top-headlines?country=us&sortBy=popularity&apiKey={newsapi_key}'
          
          try:
              response = requests.get(url, timeout=10)
              articles = response.json().get('articles', [])[:15]
              
              if not articles:
                  print("No articles found")
                  exit(1)

              today = datetime.now().strftime('%A, %B %d, %Y')
              html_content = f'''
              <html>
                <head>
                  <style>
                    body {{ font-family: Arial, sans-serif; margin: 20px; background-color: #f5f5f5; }}
                    .container {{ max-width: 800px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; }}
                    h1 {{ color: #1f77d4; margin-bottom: 10px; }}
                    .date {{ color: #666; font-size: 14px; margin-bottom: 20px; }}
                    .news-item {{ margin: 20px 0; padding: 15px; border-left: 4px solid #1f77d4; background-color: #f9f9f9; }}
                    .news-title {{ font-weight: bold; color: #333; margin: 5px 0; font-size: 16px; }}
                    .news-desc {{ color: #666; font-size: 14px; margin: 10px 0; line-height: 1.5; }}
                    .news-source {{ color: #999; font-size: 12px; margin-top: 8px; }}
                    a {{ color: #1f77d4; text-decoration: none; font-weight: bold; }}
                    a:hover {{ text-decoration: underline; }}
                    .footer {{ text-align: center; color: #999; font-size: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }}
                  </style>
                </head>
                <body>
                  <div class="container">
                    <h1>📰 Daily Global News Digest</h1>
                    <p class="date"><strong>Date:</strong> {today}</p>
                    <hr>
              '''

              for i, article in enumerate(articles, 1):
                  title = article.get('title', 'No title')
                  description = article.get('description', 'No description available')
                  url_link = article.get('url', '#')
                  source = article.get('source', {}).get('name', 'Unknown')

                  html_content += f'''
                  <div class="news-item">
                    <span style="color: #1f77d4; font-weight: bold;">#{i}</span>
                    <div class="news-title">{title}</div>
                    <div class="news-desc">{description}</div>
                    <div class="news-source">📌 Source: {source}</div>
                    <a href="{url_link}" target="_blank">Read full article →</a>
                  </div>
                  '''

              html_content += '''
                    <hr>
                    <div class="footer">
                      <p>This email was automatically generated by your Daily Global News Copilot 🤖</p>
                      <p>Powered by NewsAPI | GitHub Actions</p>
                    </div>
                  </div>
                </body>
              </html>
              '''

              msg = MIMEMultipart('alternative')
              msg['Subject'] = f"📰 Daily News Digest - {today}"
              msg['From'] = email_address
              msg['To'] = email_address

              msg.attach(MIMEText(html_content, 'html'))

              with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
                  server.login(email_address, email_password)
                  server.sendmail(email_address, email_address, msg.as_string())

              print("✅ Daily news email sent successfully!")

          except Exception as e:
              print(f"❌ Error: {e}")
              exit(1)
          EOF
